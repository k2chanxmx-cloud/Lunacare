<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}LunaCare{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#12001f">
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="icon" href="{{ url_for('static', filename='icon-512.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-512.png') }}">

  <style>
    :root {
      --bg: #09000f;
      --bg2: #160020;
      --card: rgba(31, 8, 45, 0.78);
      --card2: rgba(255, 255, 255, 0.07);
      --pink: #ff4fd8;
      --pink2: #ff9bea;
      --purple: #9b5cff;
      --blue: #6ee7ff;
      --danger: #ff4f7b;
      --warning: #ffc857;
      --text: #fff4ff;
      --muted: #c9a8d9;
      --line: rgba(255, 255, 255, 0.14);
      --shadow: 0 18px 50px rgba(255, 79, 216, 0.14);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 79, 216, 0.28), transparent 32%),
        radial-gradient(circle at top right, rgba(155, 92, 255, 0.28), transparent 34%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      padding-bottom: 92px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app-shell {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -18px -14px 18px;
      padding: 16px 14px 12px;
      background: linear-gradient(180deg, rgba(9, 0, 15, 0.96), rgba(9, 0, 15, 0.72));
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 0 28px rgba(255, 79, 216, 0.45);
      font-size: 22px;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.03em;
      line-height: 1.1;
    }

    .brand-sub {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }

    .page-title {
      margin: 12px 2px 14px;
    }

    .page-title h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    .page-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin: 14px 0;
      backdrop-filter: blur(18px);
    }

    .card-soft {
      background: var(--card2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px;
      margin: 10px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 900;
      line-height: 1.1;
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 12px;
    }

    .form-row {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }

    label {
      color: var(--pink2);
      font-weight: 700;
      font-size: 13px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      outline: none;
      border-radius: 16px;
      padding: 12px 13px;
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 13px 16px;
      color: white;
      font-weight: 900;
      cursor: pointer;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 10px 26px rgba(255, 79, 216, 0.28);
    }

    .btn-sub {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ff406f, #a9003f);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-row .btn {
      flex: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      font-size: 12px;
    }

    .alert {
      border-radius: 18px;
      padding: 13px;
      margin: 10px 0;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
    }

    .alert.danger {
      border-color: rgba(255, 79, 123, 0.6);
      background: rgba(255, 79, 123, 0.14);
    }

    .alert.warning {
      border-color: rgba(255, 200, 87, 0.6);
      background: rgba(255, 200, 87, 0.12);
    }

    .alert-title {
      font-weight: 900;
      margin-bottom: 4px;
    }

    .flash {
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 79, 216, 0.16);
      border: 1px solid rgba(255, 79, 216, 0.3);
      color: var(--pink2);
      font-weight: 700;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      z-index: 50;
      width: min(calc(100% - 20px), 760px);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      padding: 8px;
      border-radius: 24px;
      background: rgba(18, 0, 31, 0.88);
      border: 1px solid var(--line);
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .nav-item {
      display: grid;
      place-items: center;
      gap: 3px;
      padding: 7px 2px;
      border-radius: 16px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.1;
    }

    .nav-item span {
      font-size: 17px;
    }

    .nav-item.active {
      color: white;
      background: linear-gradient(135deg, rgba(255,79,216,0.36), rgba(155,92,255,0.32));
    }

    .log-list {
      display: grid;
      gap: 10px;
    }

    .log-item {
      padding: 13px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
    }

    .log-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--pink2);
      font-weight: 800;
      font-size: 13px;
    }

    .heart-select {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      margin-top: 6px;
    }

    .heart-option input {
      display: none;
    }

    .heart-option span {
      display: block;
      text-align: center;
      border-radius: 16px;
      padding: 12px 4px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      font-weight: 900;
      font-size: 13px;
    }

    .heart-option input:checked + span {
      color: white;
      border-color: rgba(255, 79, 216, 0.8);
      background: linear-gradient(135deg, rgba(255,79,216,0.55), rgba(155,92,255,0.45));
      box-shadow: 0 0 20px rgba(255,79,216,0.25);
    }

    .danger-text {
      color: var(--danger);
      font-weight: 900;
    }

    .warning-text {
      color: var(--warning);
      font-weight: 900;
    }

    @media (max-width: 430px) {
      .app-shell {
        padding-left: 12px;
        padding-right: 12px;
      }

      .brand-title {
        font-size: 18px;
      }

      .page-title h1 {
        font-size: 22px;
      }

      .stat-value {
        font-size: 23px;
      }
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">
        <div class="brand-icon">☾</div>
        <div>
          <div class="brand-title">LunaCare</div>
          <div class="brand-sub">入院回避のための体調ログ</div>
        </div>
      </a>
    </header>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <nav class="bottom-nav">
    <a class="nav-item {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
      <span>🏠</span>ホーム
    </a>
    <a class="nav-item {% if request.endpoint == 'vomit' %}active{% endif %}" href="{{ url_for('vomit') }}">
      <span>🫧</span>嘔吐
    </a>
    <a class="nav-item {% if request.endpoint == 'condition' %}active{% endif %}" href="{{ url_for('condition') }}">
      <span>☁️</span>体調
    </a>
    <a class="nav-item {% if request.endpoint == 'diary' %}active{% endif %}" href="{{ url_for('diary') }}">
      <span>💜</span>心
    </a>
    <a class="nav-item {% if request.endpoint == 'medicines' %}active{% endif %}" href="{{ url_for('medicines') }}">
      <span>💊</span>薬
    </a>
    <a class="nav-item {% if request.endpoint == 'report' %}active{% endif %}" href="{{ url_for('report') }}">
      <span>📄</span>診察
    </a>
  </nav>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js").catch(function (err) {
          console.log("ServiceWorker registration failed:", err);
        });
      });
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
