<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>{% block title %}LunaCare{% endblock %}</title>

  <meta name="theme-color" content="#14001f">

  <link rel="manifest" href="{{ url_for('manifest') }}">

  <link
    rel="apple-touch-icon"
    href="{{ url_for('static', filename='icon-192.png') }}"
  >

  <style>

    :root{
      --bg1:#14001f;
      --bg2:#220033;
      --card:#2a063a;
      --card2:#341047;

      --pink:#ff4fd8;
      --pink2:#c86cff;

      --line:rgba(255,255,255,0.08);

      --text:#fff7ff;
      --muted:#caaed8;

      --danger:#ff5b9f;
      --warning:#ffb347;
      --success:#7dffb3;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      padding:0;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;

      background:
        radial-gradient(circle at top, #3c005f 0%, var(--bg1) 45%),
        linear-gradient(180deg, var(--bg1), #09000f);

      color:var(--text);

      min-height:100vh;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .container{
      width:min(760px, 100%);
      margin:0 auto;
      padding:
        env(safe-area-inset-top)
        14px
        120px
        14px;
    }

    .page-title{
      margin:12px 0 18px;
    }

    .page-title h1{
      margin:0;
      font-size:28px;
      font-weight:900;
      letter-spacing:0.04em;
    }

    .page-title p{
      margin-top:8px;
      color:var(--muted);
      line-height:1.7;
      font-size:13px;
    }

    .card{
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.04),
          rgba(255,255,255,0.02)
        );

      border:1px solid var(--line);

      border-radius:28px;

      padding:18px;

      margin-bottom:16px;

      backdrop-filter: blur(10px);
    }

    .card-soft{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:20px;
      padding:14px;
      margin-top:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .stat{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:22px;
      padding:14px;
    }

    .stat-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .stat-value{
      font-size:28px;
      font-weight:900;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:22px;
      padding:16px;

      background:
        linear-gradient(
          135deg,
          var(--pink),
          var(--pink2)
        );

      color:white;

      font-size:15px;
      font-weight:800;

      cursor:pointer;

      transition:0.15s;
    }

    .btn:active{
      transform:scale(0.98);
    }

    .btn-sub{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
    }

    .btn-danger{
      background:
        linear-gradient(
          135deg,
          #ff4f7b,
          #ff6db4
        );
    }

    .btn-row{
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    input,
    textarea,
    select{
      width:100%;

      border:none;
      outline:none;

      background:rgba(255,255,255,0.04);

      border:1px solid rgba(255,255,255,0.06);

      color:white;

      border-radius:20px;

      padding:16px;

      font-size:15px;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .form-row{
      margin-bottom:14px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:13px;
      color:#ffc8ff;
      font-weight:700;
    }

    .muted{
      color:var(--muted);
    }

    .small{
      font-size:12px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:4px;

      padding:6px 12px;

      border-radius:999px;

      background:rgba(255,255,255,0.06);

      border:1px solid rgba(255,255,255,0.06);

      font-size:12px;
    }

    .alert{
      border-radius:22px;
      padding:16px;
      margin-bottom:12px;
    }

    .alert.warning{
      background:rgba(255,179,71,0.08);
      border:1px solid rgba(255,179,71,0.18);
    }

    .alert.danger{
      background:rgba(255,91,159,0.08);
      border:1px solid rgba(255,91,159,0.18);
    }

    .alert.success{
      background:rgba(125,255,179,0.08);
      border:1px solid rgba(125,255,179,0.18);
    }

    .alert-title{
      font-weight:800;
      margin-bottom:6px;
    }

    .danger-text{
      color:#ff84bd;
    }

    .warning-text{
      color:#ffc56b;
    }

    .success-text{
      color:#8cffc3;
    }

    .log-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .log-item{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:22px;
      padding:14px;
    }

    .log-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      font-weight:700;
    }

    .flash{
      margin-bottom:14px;
      padding:14px;
      border-radius:18px;

      background:rgba(255,255,255,0.06);

      border:1px solid rgba(255,255,255,0.06);
    }

    .bottom-nav{
      position:fixed;

      left:50%;
      bottom:10px;

      transform:translateX(-50%);

      width:min(760px, calc(100% - 16px));

      display:grid;
      grid-template-columns:repeat(7,1fr);

      gap:6px;

      padding:10px;

      border-radius:30px;

      background:rgba(20,0,31,0.92);

      backdrop-filter:blur(20px);

      border:1px solid rgba(255,255,255,0.08);

      z-index:9999;
    }

    .nav-item{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      gap:4px;

      padding:10px 4px;

      border-radius:20px;

      font-size:9px;

      color:#e8cfff;

      transition:0.15s;
    }

    .nav-item span{
      font-size:22px;
    }

    .nav-item.active{
      background:
        linear-gradient(
          135deg,
          rgba(255,79,216,0.35),
          rgba(200,108,255,0.35)
        );

      color:white;

      font-weight:800;

      box-shadow:
        0 0 20px rgba(255,79,216,0.18);
    }

    code{
      background:rgba(255,255,255,0.08);
      padding:2px 6px;
      border-radius:8px;
    }

    @media (max-width:430px){

      .grid{
        grid-template-columns:1fr 1fr;
      }

      .stat-value{
        font-size:22px;
      }

      .nav-item span{
        font-size:20px;
      }

      .nav-item{
        font-size:8px;
      }

    }

  </style>

  {% block head %}{% endblock %}
</head>

<body>

<div class="container">

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">
          {{ msg }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

</div>

<nav class="bottom-nav">

  <a class="nav-item {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
    <span>🏠</span>ホーム
  </a>

  <a class="nav-item {% if request.endpoint == 'vomit' %}active{% endif %}" href="{{ url_for('vomit') }}">
    <span>🫧</span>嘔吐
  </a>

  <a class="nav-item {% if request.endpoint == 'condition' %}active{% endif %}" href="{{ url_for('condition') }}">
    <span>☁️</span>体調
  </a>

  <a class="nav-item {% if request.endpoint == 'diary' %}active{% endif %}" href="{{ url_for('diary') }}">
    <span>💜</span>心
  </a>

  <a class="nav-item {% if request.endpoint == 'analysis' %}active{% endif %}" href="{{ url_for('analysis') }}">
    <span>📊</span>分析
  </a>

  <a class="nav-item {% if request.endpoint == 'medicines' %}active{% endif %}" href="{{ url_for('medicines') }}">
    <span>💊</span>薬
  </a>

  <a class="nav-item {% if request.endpoint == 'report' %}active{% endif %}" href="{{ url_for('report') }}">
    <span>📄</span>診察
  </a>

</nav>

<script>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js");
  });
}

</script>

{% block scripts %}{% endblock %}

</body>
</html>
